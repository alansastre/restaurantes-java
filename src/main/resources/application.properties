spring.application.name=restaurantes-java

# Perfil por defecto si NO se activa ninguno: dev (H2 en memoria).
# Usamos "default" (no "active"): es solo el valor por defecto y se puede sobreescribir
# activando otro perfil SIN tocar este fichero:
#   - IntelliJ: Run Config > Modify options > Active profiles -> prod
#   - Comando:  ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod
#   - Entorno:  SPRING_PROFILES_ACTIVE=prod
spring.profiles.default=dev

# --- Configuracion comun a todos los perfiles ---
spring.web.error.include-message=always
spring.servlet.multipart.max-file-size=10MB
