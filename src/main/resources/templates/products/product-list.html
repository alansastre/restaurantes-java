<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Catálogo de Productos')}"></head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">

    <!-- Cabecera + contador -->
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-1 gap-2">
        <h1 class="mb-0">
            <i class="fa-solid fa-bag-shopping text-primary me-2"></i>Productos
        </h1>
        <span class="badge bg-secondary fs-6"
              th:text="|${#lists.size(products)} productos|">0 productos</span>
    </div>
    <p class="text-muted small mb-4">
        <i class="fa-solid fa-cloud-arrow-down text-primary me-1"></i>
        Datos en vivo desde <code>fakestoreapi.com</code> consumidos con <code>RestClient</code>.
    </p>

    <!-- Estado vacío -->
    <div th:if="${#lists.isEmpty(products)}" class="alert alert-light border text-center py-5">
        <i class="fa-regular fa-folder-open fa-2x mb-2 d-block text-muted"></i>
        <p class="mb-0 text-muted">No se ha podido recuperar ningún producto</p>
    </div>

    <!-- Grid de productos -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"
         th:unless="${#lists.isEmpty(products)}">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100 shadow-sm border-0">

                <!-- Imagen sobre fondo blanco (los PNG de fakestore son transparentes) -->
                <div class="bg-white rounded-top d-flex align-items-center justify-content-center p-3"
                     style="height: 200px;">
                    <img th:if="${product.image()}" th:src="${product.image()}"
                         th:alt="${product.title()}"
                         class="img-fluid object-fit-contain" style="max-height: 100%;">
                    <span th:unless="${product.image()}" class="text-muted">
                        <i class="fa-regular fa-image fa-2x"></i>
                    </span>
                </div>

                <div class="card-header bg-body-tertiary py-2">
                    <span class="badge bg-secondary text-uppercase"
                          th:text="${product.category()}">categoría</span>
                </div>

                <div class="card-body d-flex flex-column">

                    <!-- Título recortado a 2 líneas para que las tarjetas queden parejas -->
                    <h2 class="card-title h6"
                        style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                        th:text="${product.title()}">Título del producto</h2>

                    <!-- Valoración (RatingDTO) -->
                    <div class="mb-2 small" th:if="${product.rating() != null}">
                        <span class="text-warning"
                              th:with="redondeo=${T(java.lang.Math).round(product.rating().rate())}">
                            <i th:each="estrella : ${#numbers.sequence(1, 5)}"
                               class="fa-star"
                               th:classappend="${estrella <= redondeo} ? 'fa-solid' : 'fa-regular'"></i>
                        </span>
                        <span class="text-muted ms-1"
                              th:text="'(' + ${product.rating().count()} + ')'">(120)</span>
                    </div>

                    <!-- Precio anclado abajo con mt-auto -->
                    <p class="fs-5 fw-bold text-success mt-auto mb-0"
                       th:text="${product.price() != null ? #numbers.formatDecimal(product.price(), 1, 2) + ' €' : 'Sin precio'}">0,00 €</p>
                </div>

                <div class="card-footer bg-transparent border-0 pt-0">
                    <a th:href="@{/products/{id}(id=${product.id()})}"
                       class="btn btn-primary btn-sm w-100">
                        <i class="fa-regular fa-eye me-1"></i> Ver
                    </a>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
