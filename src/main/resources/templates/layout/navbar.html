<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <img th:src="@{/images/logo2.png}" alt="FoodDevs"
                 height="38" class="me-2 rounded-3">
<!--            <span>FoodDevs</span>-->
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/restaurants}">
                        <i class="fa-solid fa-store me-1"></i> Restaurantes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reviews}">
                        <i class="fa-solid fa-star me-1"></i> Reseñas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dishes}">
                        <i class="fa-solid fa-bowl-food me-1"></i> Platos
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/orders}">
                        <i class="fa-solid fa-ticket me-1"></i> Pedidos
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">
                        <i class="fa-solid fa-users me-1"></i> Usuarios
                    </a>
                </li>
            </ul>

            <span th:if="${env}" th:text="${env}" class="badge bg-success mx-2"></span>


            <!-- Toggle tema claro/oscuro (Bootstrap color modes) -->
            <button id="themeToggle" type="button"
                    class="btn btn-outline-light btn-sm me-3"
                    aria-label="Cambiar tema claro u oscuro" title="Cambiar tema">
                <i class="fa-solid fa-moon"></i>
            </button>

            <div sec:authorize="!isAuthenticated()" class="d-flex justify-content-end">
                <a class="btn btn-outline-light btn-sm" th:href="@{/login}">
                    <i class="fa-solid fa-sign-in"></i> Entrar
                </a>
                <a class="btn btn-light btn-sm ms-2" th:href="@{/register}">
                    <i class="fa-solid fa-circle-user"></i> Registro
                </a>
            </div>

<!--            ${countFavorites}-->
<!--            -->
<!--            ${countCartItems}-->
<!--            -->
<!--            ${lessonsView}-->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center justify-content-end">


                <a class="d-flex align-items-center text-light text-decoration-none me-3" th:href="@{/profile}">
                    <img
                        th:src="${#authentication.principal.imageUrl != null ?
                        #authentication.principal.imageUrl : '/images/avatar.svg'}"
                    alt="avatar" width="32" height="32"
                    class="rounded-circle object-fit-cover me-2 border border-2 border-light bg-white">

                    <span sec:authentication="name"></span>

                </a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button class="btn btn-outline-light btn-sm ms-2">
                        <i class="fa-solid fa-sign-out"></i> Salir
                    </button>
                </form>

            </div>


        </div>
    </div>

    <!-- Comportamiento del toggle: guarda la preferencia y cambia el icono -->
    <script>
        (() => {
            const btn = document.getElementById('themeToggle');
            const icono = btn.querySelector('i');
            const pintar = (tema) => {
                document.documentElement.setAttribute('data-bs-theme', tema);
                icono.className = tema === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            };
            // Sincroniza el icono con el tema que ya aplicó el script del <head>
            pintar(document.documentElement.getAttribute('data-bs-theme') || 'light');
            btn.addEventListener('click', () => {
                const siguiente = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
                localStorage.setItem('theme', siguiente);
                pintar(siguiente);
            });
        })();
    </script>
</nav>
</body>
</html>
