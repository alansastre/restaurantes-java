# Perfil PROD: PostgreSQL 18 (se levanta con docker compose, ver compose.yaml)
# Los valores por defecto coinciden con compose.yaml; se pueden sobreescribir por entorno.
#
# NOTA (datos demo): el main() de RestaurantesJavaApplication y DataInitializer siembran
# datos en CADA arranque sin guarda. Con H2 (dev/test) la BD se recrea y da igual, pero
# aqui (PostgreSQL persistente, ddl-auto=update) un 2o arranque los vuelve a insertar =>
# datos duplicados (o error si algun campo es UNIQUE, p.ej. el DNI de Employee).
# Para empezar de cero:   docker compose down -v   y luego   docker compose up -d
# Alternativas para reinicios limpios: poner ddl-auto=create-drop en este fichero,
# o saltar el seeding cuando el perfil prod este activo.
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:restaurantes}
spring.datasource.username=${POSTGRES_USER:restaurantes}
spring.datasource.password=${POSTGRES_PASSWORD:restaurantes}
spring.datasource.driver-class-name=org.postgresql.Driver

# update: Hibernate crea/actualiza el esquema y los datos persisten entre arranques
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# La consola H2 no aplica con PostgreSQL
spring.h2.console.enabled=false
