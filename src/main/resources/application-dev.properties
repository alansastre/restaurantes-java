# Perfil DEV: base de datos H2 en memoria (rapido, se recrea en cada arranque)
spring.datasource.url=jdbc:h2:mem:restaurantes_db
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Consola web de H2 en http://localhost:8080/h2-console
spring.h2.console.enabled=true
